---
# tasks file for openclaw

- name: Check if Ollama is installed
  ansible.builtin.stat:
    path: /usr/local/bin/ollama
  register: openclaw_ollama_bin

- name: Fail if Ollama is not installed
  ansible.builtin.fail:
    msg: "Ollama is required but not installed. Run the ollama role first."
  when: not openclaw_ollama_bin.stat.exists

- name: Check if OpenClaw is already installed
  ansible.builtin.command: which openclaw
  register: openclaw_bin
  failed_when: false
  changed_when: false

- name: Launch OpenClaw via Ollama
  ansible.builtin.command: >
    ollama launch openclaw --yes --model {{ openclaw_model }}
  when: openclaw_bin.rc != 0
  changed_when: openclaw_bin.rc != 0
  register: openclaw_launch

- name: OpenClaw successfully installed!
  ansible.builtin.debug:
    msg: "OpenClaw is ready on {{ inventory_hostname }} with model {{ openclaw_model }}"
