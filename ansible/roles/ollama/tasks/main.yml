---
# tasks file for ollama
- name: Check if Ollama is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/ollama
  register: ollama_bin

- name: Download Ollama installation script
  ansible.builtin.get_url:
    url: https://ollama.com/install.sh
    dest: /tmp/install_ollama.sh
    mode: '0755'
  when: not ollama_bin.stat.exists

- name: Execute Ollama installation script
  ansible.builtin.command: /tmp/install_ollama.sh
  when: not ollama_bin.stat.exists
  changed_when: not ollama_bin.stat.exists
  register: ollama_install

- name: Ensure Ollama service is started and enabled
  ansible.builtin.systemd:
    name: ollama
    state: started
    enabled: true

- name: Run Ollama signin to generate OAuth link
  ansible.builtin.command: ollama signin
  register: ollama_signin_result
  changed_when: false

- name: Pause to allow user to complete Ollama OAuth sign-in
  ansible.builtin.pause:
    prompt: |
      
      ===============================================================
      Action Required: Ollama Authentication
      ===============================================================
      Ollama needs you to authenticate to use Cloud models.
      Please open the following link in your browser to sign in:
      
      {{ ollama_signin_result.stdout }}
      
      Once you have successfully signed in on the web, come back here.
      ===============================================================
      Press ENTER to continue...
  when: "'already signed in' not in ollama_signin_result.stdout and 'already signed in' not in ollama_signin_result.stderr"

- name: Verify Ollama sign-in status
  ansible.builtin.command: ollama signin
  register: ollama_verify_signin
  changed_when: false
  when: "'already signed in' not in ollama_signin_result.stdout and 'already signed in' not in ollama_signin_result.stderr"

- name: Fail if Ollama authentication was not completed
  ansible.builtin.fail:
    msg: >
      Ollama authentication failed!
      You probably didn't complete the sign-in process via the OAuth link.
      Please rerun the Playbook and complete the connection step in your web browser.
  when:
    - "'already signed in' not in ollama_signin_result.stdout and 'already signed in' not in ollama_signin_result.stderr"
    - "'already signed in' not in ollama_verify_signin.stdout and 'already signed in' not in ollama_verify_signin.stderr"

- name: Pull requested Ollama models
  ansible.builtin.command: "ollama pull {{ item }}"
  loop: "{{ ollama_models | default([]) }}"
  register: ollama_pull_status
  changed_when: false
  # Note: `changed_when: false` to keep playbook clean, as Ollama will just verify layers if already pulled

- name: Ollama successfully installed!
  ansible.builtin.debug:
    msg: "Ollama is ready on {{ inventory_hostname }}"
